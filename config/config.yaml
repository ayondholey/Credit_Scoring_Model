data:
  raw_path: "data/raw/credit_data.csv"
  processed_path: "data/processed/credit_data_processed.csv"
  target_column: "credit_risk"
  test_size: 0.2
  random_state: 42
  stratify: true

preprocessing:
  missing_value_strategy: "median"
  categorical_encoding: "woe"
  scaling_method: "standard"
  handle_imbalance: true
  imbalance_method: "smote"
  outlier_method: "iqr"
  feature_selection: true
  feature_selection_method: "mutual_info"
  n_features: 20

features:
  categorical_features:
    - "checking_account"
    - "savings_account"
    - "employment_duration"
    - "property"
    - "housing"
    - "purpose"
    - "sex"
    - "housing"
  numerical_features:
    - "duration"
    - "credit_amount"
    - "installment_rate"
    - "age"
    - "existing_credits"
    - "num_dependents"
  target: "credit_risk"

models:
  logistic_regression:
    enabled: true
    params:
      C: 1.0
      penalty: "l2"
      solver: "lbfgs"
      max_iter: 1000
      class_weight: "balanced"
      random_state: 42
  
  decision_tree:
    enabled: true
    params:
      max_depth: 10
      min_samples_split: 20
      min_samples_leaf: 10
      class_weight: "balanced"
      random_state: 42
  
  random_forest:
    enabled: true
    params:
      n_estimators: 200
      max_depth: 15
      min_samples_split: 20
      min_samples_leaf: 10
      class_weight: "balanced"
      random_state: 42
      n_jobs: -1
  
  xgboost:
    enabled: false
    params:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 1
      random_state: 42
      n_jobs: -1
  
  lightgbm:
    enabled: false
    params:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      class_weight: "balanced"
      random_state: 42
      n_jobs: -1
      verbose: -1
  
  catboost:
    enabled: false
    params:
      iterations: 200
      depth: 6
      learning_rate: 0.1
      class_weights: [1, 1]
      random_state: 42
      verbose: false

hyperparameter_tuning:
  enabled: true
  n_trials: 50
  timeout: 3600
  direction: "maximize"
  metric: "roc_auc"

evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "roc_auc"
    - "precision_recall_auc"
    - "brier_score"
  cv_folds: 5
  stratify: true
  threshold_optimization: true
  threshold_metric: "f1"

output:
  model_path: "models/best_model.pkl"
  preprocessor_path: "models/preprocessor.pkl"
  metrics_path: "results/metrics.json"
  plots_path: "results/plots/"
  logs_path: "logs/"

logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
  file: "logs/credit_scoring.log"
  rotation: "10 MB"
  retention: "10 days"